# Deploy full stack (React + Express API) on Render — recommended if Vercel shows Not Found.
# Dashboard: New → Blueprint → connect this repo, or create a Web Service manually.

services:
  - type: web
    name: izzmarket
    runtime: node
    plan: free
    buildCommand: npm install && npm run render-postbuild
    startCommand: NODE_ENV=production node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: COOKIE_EXPIRE
        value: 5
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
